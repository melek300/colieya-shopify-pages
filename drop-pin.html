<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Colieya</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
  .header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    background: #1A237E; color: #fff; padding: 14px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  .header h1 { margin: 0; font-size: 16px; }
  .header p { margin: 4px 0 0; font-size: 12px; color: #c5cae9; }
  .center-pin {
    position: absolute; top: 50%; left: 50%; z-index: 900;
    transform: translate(-50%, -100%); pointer-events: none;
    font-size: 44px; filter: drop-shadow(0 3px 4px rgba(0,0,0,.4));
  }
  .panel {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: #fff; border-radius: 18px 18px 0 0; padding: 16px;
    box-shadow: 0 -2px 16px rgba(0,0,0,.15);
  }
  .hint { font-size: 13px; color: #555; margin: 0 0 12px; text-align: center; line-height: 1.4; }
  button {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    font-size: 15px; font-weight: bold; cursor: pointer;
  }
  .btn-gps { background: #E8EAF6; color: #1A237E; margin-bottom: 10px; }
  .btn-confirm { background: #1A237E; color: #fff; }
  .btn-confirm:disabled { opacity: .5; }

  .langbar { position: absolute; top: 10px; z-index: 3000; display: flex; gap: 6px; }
  html[dir="rtl"] .langbar { left: 12px; }
  html[dir="ltr"] .langbar { right: 12px; }
  .langbar button {
    width: auto; padding: 6px 10px; font-size: 13px; border-radius: 8px;
    background: rgba(255,255,255,.9); color: #1A237E; box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  .langbar button.active { background: #2979FF; color: #fff; }

  .choice {
    position: absolute; inset: 0; z-index: 2200; background: #1A237E;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .choice.hide { display: none; }
  .choice-card {
    background: #fff; border-radius: 18px; padding: 24px; max-width: 360px; width: 100%;
    text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,.3);
  }
  .choice-card .ico { font-size: 46px; }
  .choice-card h2 { font-size: 18px; color: #1A237E; margin: 10px 0 18px; line-height: 1.4; }

  .loading {
    position: absolute; inset: 0; z-index: 2500; background: #1A237E; color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px; text-align: center;
  }
  .loading.hide { display: none; }
  .spin {
    width: 46px; height: 46px; border: 4px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%; animation: sp 1s linear infinite;
    margin-bottom: 18px;
  }
  @keyframes sp { to { transform: rotate(360deg); } }
  .ok-screen {
    position: absolute; inset: 0; z-index: 2600; background: #f4f6fb;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px; text-align: center;
  }
  .ok-screen.show { display: flex; }
  .ok-screen h1 { color: #2E7D32; font-size: 22px; margin: 0 0 10px; }
  .ok-screen p { color: #555; font-size: 14px; line-height: 1.5; max-width: 320px; }
</style>
</head>
<body>

<div class="langbar">
  <button data-lang="ar">ع</button>
  <button data-lang="fr">FR</button>
  <button data-lang="en">EN</button>
</div>

<div class="header">
  <h1 id="t-title">📍</h1>
  <p id="sub"></p>
</div>

<div id="map"></div>
<div class="center-pin">📍</div>

<div class="panel" id="panel" style="display:none;">
  <p class="hint" id="t-hint"></p>
  <button class="btn-gps" id="gpsBtn"></button>
  <button class="btn-confirm" id="confirmBtn"></button>
</div>

<div class="choice" id="choiceScreen">
  <div class="choice-card">
    <div class="ico">📦</div>
    <h2 id="t-question"></h2>
    <button class="btn-confirm" id="useGpsBtn"></button>
    <button class="btn-gps" id="useMapBtn"></button>
  </div>
</div>

<div class="loading hide" id="loading">
  <div class="spin"></div>
  <h2 id="t-loading" style="margin:0 0 8px;font-size:18px;"></h2>
  <p id="t-loadingSub" style="margin:0;font-size:13px;color:#c5cae9;max-width:300px;line-height:1.5;"></p>
</div>

<div class="ok-screen" id="okScreen">
  <h1 id="t-okTitle"></h1>
  <p id="t-okText"></p>
  <button class="btn-gps" id="adjustBtn" style="max-width:300px;margin-top:20px;"></button>
</div>

<script>
  const FUNCTIONS_BASE = 'https://hzzmjntnbsthhvexhhjt.supabase.co/functions/v1';
  const GMAPS_KEY = 'AIzaSyAmY7NegV3GXUT9h4DTqfigSQEPft9GMnI';
  const params = new URLSearchParams(window.location.search);
  const parcelId = params.get('id') || '';

  const I18N = {
    ar: {
      dir: 'rtl', title: '📍 وين نوصّلو طردك؟',
      question: 'تحب نستعملو موقعك الحالي، ولا تختارو من الخريطة؟',
      useGps: '📍 إيه، استعمل موقعي الحالي', useMap: '🗺️ نختارو من الخريطة',
      loading: '📍 جاري تحديد موقعك…', loadingSub: 'اسمح بالوصول لموقعك باش نسجّلو تلقائياً.',
      hint: 'حرّك الخريطة وحطّ 📍 على باب دارك، ثم أكّد.',
      gps: '📡 استعمل موقعي الحالي (GPS)', confirm: '✅ أكّد موقعي',
      okTitle: '✅ شكراً!', okText: 'تسجّل موقعك. السائق باش يعرف وين يلقاك بالضبط. تنجّم تسكّر الصفحة.',
      adjust: '🗺️ الموقع مش مضبوط؟ عدّلو على الخريطة', invalid: 'رابط غير صالح (الطرد ناقص).'
    },
    fr: {
      dir: 'ltr', title: '📍 Où livrer votre colis ?',
      question: 'Utiliser votre position actuelle, ou choisir sur la carte ?',
      useGps: '📍 Oui, utiliser ma position', useMap: '🗺️ Choisir sur la carte',
      loading: '📍 Localisation en cours…', loadingSub: 'Autorisez l\'accès à votre position pour l\'enregistrer automatiquement.',
      hint: 'Centrez le repère 📍 sur votre porte, puis confirmez.',
      gps: '📡 Utiliser ma position actuelle (GPS)', confirm: '✅ Confirmer ma position',
      okTitle: '✅ Merci !', okText: 'Votre position a été enregistrée. Le livreur saura où vous trouver. Vous pouvez fermer cette page.',
      adjust: '🗺️ Position pas exacte ? Ajuster sur la carte', invalid: 'Lien invalide (colis manquant).'
    },
    en: {
      dir: 'ltr', title: '📍 Where to deliver your parcel?',
      question: 'Use your current location, or pick on the map?',
      useGps: '📍 Yes, use my location', useMap: '🗺️ Choose on the map',
      loading: '📍 Locating…', loadingSub: 'Allow location access to save it automatically.',
      hint: 'Center the pin 📍 on your door, then confirm.',
      gps: '📡 Use my current location (GPS)', confirm: '✅ Confirm my location',
      okTitle: '✅ Thank you!', okText: 'Your location has been saved. The courier will know where to find you. You can close this page.',
      adjust: '🗺️ Not exact? Adjust on the map', invalid: 'Invalid link (parcel missing).'
    }
  };

  let clientName = '', lang = 'ar', map = null;

  function t(k){ return (I18N[lang] && I18N[lang][k]) || I18N.fr[k] || ''; }

  function applyLang(l){
    lang = l;
    document.documentElement.setAttribute('lang', l);
    document.documentElement.setAttribute('dir', I18N[l].dir);
    const set = (id, k) => { document.getElementById(id).textContent = t(k); };
    set('t-title','title'); set('t-question','question'); set('useGpsBtn','useGps');
    set('useMapBtn','useMap'); set('t-loading','loading'); set('t-loadingSub','loadingSub');
    set('t-hint','hint'); set('gpsBtn','gps'); set('confirmBtn','confirm');
    set('t-okTitle','okTitle'); set('t-okText','okText'); set('adjustBtn','adjust');
    updateSub();
    document.querySelectorAll('.langbar button').forEach(b =>
      b.classList.toggle('active', b.dataset.lang === l));
  }

  function updateSub(){
    const sub = document.getElementById('sub');
    if (!parcelId) { sub.textContent = t('invalid'); return; }
    sub.textContent = clientName
      ? (lang === 'ar' ? `مرحبا ${clientName} 👋` : (lang === 'en' ? `Hello ${clientName} 👋` : `Bonjour ${clientName} 👋`))
      : '';
  }

  // ── Google Maps ──────────────────────────────────────────────────────────
  function initMap(){
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 36.8065, lng: 10.1815 },
      zoom: 13,
      disableDefaultUI: true,
      zoomControl: true,
      gestureHandling: 'greedy',
      clickableIcons: false,
    });
  }
  function recenter(lat, lng, zoom){
    if (!map) return;
    map.setCenter({ lat, lng });
    if (zoom) map.setZoom(zoom);
  }
  function centerLatLng(){
    const c = map.getCenter();
    return { lat: c.lat(), lng: c.lng() };
  }

  const choiceScreen = document.getElementById('choiceScreen');
  const loading = document.getElementById('loading');
  const okScreen = document.getElementById('okScreen');
  const panel = document.getElementById('panel');
  const confirmBtn = document.getElementById('confirmBtn');

  (async () => {
    if (!parcelId) return;
    try {
      const res = await fetch(`${FUNCTIONS_BASE}/parcel-location?id=${encodeURIComponent(parcelId)}`);
      const data = await res.json();
      if (data && data.found && data.receiver_name) { clientName = data.receiver_name; updateSub(); }
    } catch (e) {}
  })();

  async function savePosition(lat, lng){
    const res = await fetch(`${FUNCTIONS_BASE}/parcel-location`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: parcelId, lat, lng }),
    });
    const data = await res.json();
    return !!(data && data.success);
  }

  function showMap(){
    choiceScreen.classList.add('hide');
    loading.classList.add('hide');
    okScreen.classList.remove('show');
    panel.style.display = 'block';
    if (map) google.maps.event.trigger(map, 'resize');
  }

  document.getElementById('useGpsBtn').addEventListener('click', () => {
    if (!parcelId) { alert(t('invalid')); return; }
    choiceScreen.classList.add('hide');
    loading.classList.remove('hide');
    if (!navigator.geolocation) { showMap(); return; }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const { latitude, longitude } = pos.coords;
        recenter(latitude, longitude, 18);
        try {
          const ok = await savePosition(latitude, longitude);
          if (ok) { loading.classList.add('hide'); okScreen.classList.add('show'); }
          else showMap();
        } catch (e) { showMap(); }
      },
      () => showMap(),
      { enableHighAccuracy: true, timeout: 12000 }
    );
  });

  document.getElementById('useMapBtn').addEventListener('click', showMap);
  document.getElementById('adjustBtn').addEventListener('click', showMap);

  document.getElementById('gpsBtn').addEventListener('click', () => {
    if (!navigator.geolocation) { alert('GPS ✗'); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => recenter(pos.coords.latitude, pos.coords.longitude, 18),
      () => alert('GPS ✗'),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });

  confirmBtn.addEventListener('click', async () => {
    if (!parcelId || !map) return;
    const c = centerLatLng();
    confirmBtn.disabled = true;
    try {
      const ok = await savePosition(c.lat, c.lng);
      if (ok) okScreen.classList.add('show'); else alert('✗');
    } catch (e) { alert('✗'); }
    confirmBtn.disabled = false;
  });

  document.querySelectorAll('.langbar button').forEach(b =>
    b.addEventListener('click', () => applyLang(b.dataset.lang)));

  applyLang('ar');
</script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAmY7NegV3GXUT9h4DTqfigSQEPft9GMnI&callback=initMap"></script>
</body>
</html>
